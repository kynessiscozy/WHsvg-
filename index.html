<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武魂模拟器 - 豪华版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        :root {
            --gold: #d4af37;
            --blue-glow: #4facfe;
            --panel-bg: rgba(10, 14, 23, 0.85);
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主容器：加入星空背景贴图 */
        .mobile-container {
            width: 375px;
            height: 812px;
            background: 
                linear-gradient(to bottom, rgba(10, 20, 40, 0.7), #05080f),
                url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=400&q=80'); /* 星空贴图 */
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            color: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ================= 顶部信息区 ================= */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            position: relative;
        }

        .game-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .stats-group { text-align: right; }
        .stat-line {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 8px;
            gap: 8px;
        }
        .stat-line img { width: 18px; height: 18px; opacity: 0.9; }
        .stat-label { font-size: 11px; color: #8b9bb4; }
        .stat-val { font-size: 16px; font-weight: bold; font-family: 'Georgia', serif; }

        /* ================= 中心视觉区 (核心美化) ================= */
        .visual-stage {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 旋转的魔法阵贴图 */
        .magic-circle {
            position: absolute;
            width: 90%;
            height: 90%;
            background: url('https://img.icons8.com/ios/500/ffffff/magic-crystal-ball.png'); /* 这里建议换成你的圆形阵法PNG */
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.3;
            filter: sepia(1) saturate(5) hue-rotate(180deg) brightness(1.5); /* 将白色贴图转为蓝色 */
            animation: rotateCircle 30s linear infinite;
        }

        /* 龙的贴图：建议使用透明背景PNG */
        .dragon-art {
            width: 280px;
            z-index: 5;
            filter: drop-shadow(0 0 20px var(--blue-glow));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes rotateCircle { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        /* ================= 文字信息区 ================= */
        .info-card {
            position: absolute;
            bottom: 100px;
            width: 100%;
            padding: 0 25px;
            background: linear-gradient(to top, rgba(5,8,15,1), transparent);
        }

        .name-tag {
            font-size: 28px;
            text-align: center;
            color: #add8e6;
            margin-bottom: 15px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(173, 216, 230, 0.6);
        }

        .detail-list {
            list-style: none;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            color: #ccc;
        }
        .detail-list li { margin: 5px 0; }
        .detail-list b { color: #fff; margin-left: 5px; }

        /* ================= 底部导航 ================= */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: var(--panel-bg);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            text-align: center;
            font-size: 11px;
            color: #666;
        }
        .nav-item img {
            width: 24px;
            height: 24px;
            display: block;
            margin: 0 auto 5px;
            filter: grayscale(1);
            opacity: 0.6;
        }
        .nav-item.active { color: var(--gold); }
        .nav-item.active img { filter: grayscale(0); opacity: 1; }

    </style>
</head>
<body>

<div class="mobile-container">
    <header class="header">
        <div class="game-title">武魂模拟器</div>
        <div class="stats-group">
            <div class="stat-line">
                <span class="stat-label">战力</span>
                <span class="stat-val">1,280,000</span>
                <img src="https://img.icons8.com/fluency/48/sword.png" alt="战力">
            </div>
            <div class="stat-line">
                <span class="stat-label">LV.90</span>
                <img src="https://img.icons8.com/fluency/48/shield.png" alt="等级">
            </div>
            <div class="stat-line">
                <span class="stat-val" style="font-size: 14px;">2,100,000</span>
                <img src="https://img.icons8.com/fluency/48/crystal-ball.png" alt="魂力">
            </div>
        </div>
    </header>

    <div class="visual-stage">
        <div class="magic-circle"></div>
        <img src="https://www.transparentpng.com/download/dragon/blue-dragon-png-transparent-19.png" class="dragon-art" alt="Blue Dragon">
    </div>

    <div class="info-card">
        <h2 class="name-tag">蓝电霸王龙</h2>
        <ul class="detail-list">
            <li>· 武魂类型: <b>兽武魂 (SSS+)</b></li>
            <li>· 主属性: <b>雷霆 / 强攻</b></li>
            <li>· 核心能力: <b>蓝电领域、神雷天罚</b></li>
            <li>· 战斗加成: <b style="color: #ffca28;">暴击+15%, 魂力回复+10%</b></li>
        </ul>
    </div>

    <nav class="nav-bar">
        <div class="nav-item">
            <img src="https://img.icons8.com/fluency/48/swords.png">试炼
        </div>
        <div class="nav-item">
            <img src="https://img.icons8.com/fluency/48/star-trek-symbol.png">星运
        </div>
        <div class="nav-item active">
            <img src="https://img.icons8.com/fluency/48/dragon.png">武魂
        </div>
        <div class="nav-item">
            <img src="https://img.icons8.com/fluency/48/earth-planet.png">世界
        </div>
        <div class="nav-item">
            <img src="https://img.icons8.com/fluency/48/backpack.png">背包
        </div>
    </nav>
</div>

</body>
</html>
